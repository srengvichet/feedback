<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot Password — NUM Feedback</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, #f0f6ff 0%, #f4f7fb 40%, #eaf0f9 100%);
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .card { width: 100%; max-width: 460px; border: none; border-radius: 24px; box-shadow: 0 20px 50px rgba(15,23,42,.12); overflow: hidden; }
    .card-head { background: linear-gradient(135deg, #1d4ed8, #2563eb); padding: 28px 32px; text-align: center; color: #fff; }
    .card-head h1 { font-size: 1.25rem; font-weight: 800; margin: 0; }
    .card-head p { margin: 6px 0 0; color: rgba(255,255,255,.75); font-size: .85rem; }
    .card-body { padding: 28px 32px; background: #fff; }
    .nav-tabs { border: none; gap: .5rem; }
    .nav-tabs .nav-link { border: 1.5px solid #dbe3ee !important; border-radius: 12px !important; font-weight: 700; font-size: .88rem; color: #6b7280; padding: .5rem 1.1rem; }
    .nav-tabs .nav-link.active { background: #2563eb; border-color: #2563eb !important; color: #fff; }
    .form-control { border-radius: 12px; min-height: 46px; border: 1.5px solid #dbe3ee; }
    .form-control:focus { border-color: #93c5fd; box-shadow: 0 0 0 .2rem rgba(37,99,235,.12); }
    .btn-primary { background: linear-gradient(135deg,#2563eb,#1d4ed8); border: none; border-radius: 12px; font-weight: 700; min-height: 46px; }
    .btn-telegram { background: #0088cc; border: none; border-radius: 12px; font-weight: 700; min-height: 46px; color: #fff; }
    .footer-link { text-align: center; padding: 0 32px 20px; font-size: .82rem; color: #6b7280; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-head">
    <div style="font-size:2rem;margin-bottom:8px;">🔑</div>
    <h1>Forgot Password</h1>
    <p>Reset your NUM Feedback account password</p>
  </div>
  <div class="card-body">

    <!-- Flash messages -->
    
    
    
    

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-4" id="resetTabs">
      <li class="nav-item">
        <button class="nav-link active" id="tab-email" onclick="showTab('email')">
          <i class="bi bi-envelope me-1"></i>Email / Phone
        </button>
      </li>
      
    </ul>

    <!-- Email/Phone form -->
    <div id="pane-email">
      <form action="/forgot-password" method="post"><input type="hidden" name="_csrf" value="C_TKDzK9Gx2jqsdInbsmejiv1zFgnqr5N8I2NlIlWfQaJZGOM8CvPgGFeiyOzPN5qpYSSwCX-ggErZrUAPBUAGASYJJ7QaTq"/>
        <input type="hidden" name="_csrf" value="C_TKDzK9Gx2jqsdInbsmejiv1zFgnqr5N8I2NlIlWfQaJZGOM8CvPgGFeiyOzPN5qpYSSwCX-ggErZrUAPBUAGASYJJ7QaTq" />
        <div class="mb-3">
          <label class="form-label fw-bold" style="font-size:.88rem;">Email address or phone number</label>
          <input class="form-control" name="input" type="text"
                 placeholder="e.g. teacher@num.edu.kh or +855 12 345 678" required autofocus>
        </div>
        <button class="btn btn-primary w-100" type="submit">
          <i class="bi bi-send me-1"></i>Send Reset Link
        </button>
      </form>
    </div>

    <!-- Telegram OTP form -->
    <div id="pane-telegram" style="display:none;">
      <form action="/forgot-telegram" method="post"><input type="hidden" name="_csrf" value="C_TKDzK9Gx2jqsdInbsmejiv1zFgnqr5N8I2NlIlWfQaJZGOM8CvPgGFeiyOzPN5qpYSSwCX-ggErZrUAPBUAGASYJJ7QaTq"/>
        <input type="hidden" name="_csrf" value="C_TKDzK9Gx2jqsdInbsmejiv1zFgnqr5N8I2NlIlWfQaJZGOM8CvPgGFeiyOzPN5qpYSSwCX-ggErZrUAPBUAGASYJJ7QaTq" />
        <p class="text-muted mb-3" style="font-size:.88rem;">
          Enter your username. A one-time code will be sent to your linked Telegram account.
        </p>
        <div class="mb-3">
          <label class="form-label fw-bold" style="font-size:.88rem;">Username</label>
          <input class="form-control" name="username" type="text"
                 placeholder="Your login username" required>
        </div>
        <button class="btn btn-telegram w-100" type="submit">
          <i class="bi bi-telegram me-1"></i>Send OTP via Telegram
        </button>
      </form>
    </div>

  </div>
  <div class="footer-link">
    <a href="/login" style="color:#2563eb;font-weight:700;text-decoration:none;">
      <i class="bi bi-arrow-left me-1"></i>Back to Sign In
    </a>
  </div>
</div>

<script>
  function showTab(name) {
    document.getElementById('pane-email').style.display = (name === 'email') ? '' : 'none';
    const pt = document.getElementById('pane-telegram');
    if (pt) pt.style.display = (name === 'telegram') ? '' : 'none';
    document.getElementById('tab-email').classList.toggle('active', name === 'email');
    const tt = document.getElementById('tab-telegram');
    if (tt) tt.classList.toggle('active', name === 'telegram');
  }
</script>
</body>
</html>
