services:

  db:
    image: mysql:8.4
    container_name: feedback_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: feedbackdb
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: feedback_app
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://db:3306/feedbackdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Phnom_Penh}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_ROOT_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_FROM: ${MAIL_FROM:-}
      APP_BASE_URL: ${APP_BASE_URL:-https://localhost}
      SERVER_FORWARD_HEADERS_STRATEGY: framework

  proxy:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: feedback_proxy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      TLS_CERT_DAYS: ${TLS_CERT_DAYS:-365}
    volumes:
      - ./docker/certs:/etc/nginx/certs

volumes:
  db_data:
