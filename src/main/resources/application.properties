spring.application.name=feedback

# HTTPS on 8443 (web browser)
server.port=8443
server.address=0.0.0.0
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=changeit
server.ssl.key-store-type=PKCS12


server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
# HTTP on 8080 stays open for the mobile app (see TomcatConfig)

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/feedbackdb}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.thymeleaf.cache=false
spring.jpa.open-in-view=true
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}

# Claude AI — set ANTHROPIC_API_KEY as an environment variable (recommended)
# or uncomment and set the key here (not recommended for production)
anthropic.api-key=${ANTHROPIC_API_KEY:}

# Cache
spring.cache.type=simple

# Base URL used for QR code generation and password reset links.
# Override via environment variable, for example: APP_BASE_URL=https://feedback.local
app.base-url=${APP_BASE_URL:https://10.250.0.129:8443}

# ── Email (Gmail SMTP) ────────────────────────────────────────────────────────
# Set MAIL_USERNAME and MAIL_PASSWORD as environment variables
# For Gmail: use an App Password (Google Account → Security → App Passwords)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:${spring.mail.username}}

# ── Telegram Bot ──────────────────────────────────────────────────────────────
# Set TELEGRAM_BOT_TOKEN and TELEGRAM_BOT_USERNAME as environment variables
# Get a token from @BotFather on Telegram
app.telegram.enabled=${TELEGRAM_ENABLED:false}
app.telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
app.telegram.bot-username=${TELEGRAM_BOT_USERNAME:}