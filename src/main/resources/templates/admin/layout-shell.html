<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, pageTitle, pageSubtitle, activeMenu)">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${pageTitle}">NUM Feedback Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --sidebar-bg:#0f172a;
      --sidebar-text:#cbd5e1;
      --sidebar-active:#2563eb;
      --sidebar-hover:#1e293b;
      --page-bg:#f6f8fb;
      --card-bg:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --primary:#2563eb;
      --primary-dark:#1d4ed8;
      --radius:16px;
      --shadow:0 10px 30px rgba(15,23,42,.08);
    }

    body{ margin:0; background:var(--page-bg); color:var(--text); font-family:"Segoe UI",system-ui,sans-serif; }
    .admin-shell{ display:flex; min-height:100vh; }
    .sidebar{ width:270px; background:linear-gradient(180deg,#0f172a 0%,#111827 100%); color:var(--sidebar-text); padding:22px 16px; position:sticky; top:0; height:100vh; overflow-y:auto; }
    .brand{ display:flex; align-items:center; gap:12px; padding:8px 10px 18px; border-bottom:1px solid rgba(255,255,255,.08); margin-bottom:16px; }
    .brand-logo{ width:42px; height:42px; border-radius:12px; background:linear-gradient(135deg,#2563eb,#1d4ed8); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; }
    .brand-title{ font-size:1rem; font-weight:700; color:#fff; margin:0; line-height:1.2; }
    .brand-subtitle{ font-size:.8rem; color:#94a3b8; margin:2px 0 0; }
    .nav-caption{ font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color:#94a3b8; font-weight:700; padding:12px 10px 8px; }
    .nav-link-admin{ display:flex; align-items:center; gap:10px; padding:11px 12px; margin:4px 0; border-radius:12px; color:var(--sidebar-text); text-decoration:none; font-weight:600; }
    .nav-link-admin:hover{ background:var(--sidebar-hover); color:#fff; }
    .nav-link-admin.active{ background:linear-gradient(135deg,#2563eb,#1d4ed8); color:#fff; }
    .nav-dot{ width:8px; height:8px; border-radius:50%; background:currentColor; }
    .main{ flex:1; min-width:0; }
    .topbar{ background:#fff; border-bottom:1px solid var(--border); padding:18px 28px; display:flex; justify-content:space-between; align-items:center; gap:16px; }
    .topbar-title{ font-size:1.2rem; font-weight:700; margin:0; }
    .topbar-subtitle{ font-size:.88rem; color:var(--muted); margin:2px 0 0; }
    .content{ padding:28px; }
    .card{ border-radius:16px; border:1px solid var(--border); box-shadow:var(--shadow); }
    .table thead th{ font-size:.8rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); white-space:nowrap; }
    .table tbody tr:hover{ background:#f8fafc; }
    .btn-primary{ background:linear-gradient(135deg,#2563eb,#1d4ed8); border:none; }
    @media (max-width: 992px){ .sidebar{ display:none; } .content{ padding:18px; } .topbar{ padding:14px 18px; } }
  </style>
</head>
<body>
<div class="admin-shell">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">N</div>
      <div>
        <p class="brand-title">NUM Feedback</p>
        <p class="brand-subtitle">Admin Panel</p>
      </div>
    </div>

    <div class="nav-caption">Overview</div>
    <a class="nav-link-admin" th:classappend="${activeMenu == 'dashboard'} ? ' active'" href="/admin"><span class="nav-dot"></span><span>Dashboard</span></a>
    <a class="nav-link-admin" th:classappend="${activeMenu == 'reports'} ? ' active'" href="/admin/reports"><span class="nav-dot"></span><span>Reports</span></a>
    <a class="nav-link-admin" th:classappend="${activeMenu == 'teachers'} ? ' active'" href="/admin/teachers"><span class="nav-dot"></span><span>Teachers</span></a>

    <div class="nav-caption">Academic Setup</div>
    <a class="nav-link-admin" th:classappend="${activeMenu == 'semesters'} ? ' active'" href="/admin/semesters"><span class="nav-dot"></span><span>Semesters</span></a>
    <a class="nav-link-admin" th:classappend="${activeMenu == 'courses'} ? ' active'" href="/admin/courses"><span class="nav-dot"></span><span>Courses</span></a>
    <a class="nav-link-admin" th:classappend="${activeMenu == 'cohorts'} ? ' active'" href="/admin/cohorts"><span class="nav-dot"></span><span>Cohorts</span></a>
    <a class="nav-link-admin" th:classappend="${activeMenu == 'sections'} ? ' active'" href="/admin/sections"><span class="nav-dot"></span><span>Sections</span></a>
    <a class="nav-link-admin" th:classappend="${activeMenu == 'teaching'} ? ' active'" href="/admin/teaching"><span class="nav-dot"></span><span>Teaching Schedule</span></a>
    <a class="nav-link-admin" th:classappend="${activeMenu == 'windows'} ? ' active'" href="/admin/windows"><span class="nav-dot"></span><span>Evaluation Windows</span></a>
    <a class="nav-link-admin" th:classappend="${activeMenu == 'questions'} ? ' active'" href="/admin/questions"><span class="nav-dot"></span><span>Questions</span></a>

    <div class="nav-caption">Students</div>
    <a class="nav-link-admin" th:classappend="${activeMenu == 'registry'} ? ' active'" href="/admin/students/registry"><span class="nav-dot"></span><span>Student Registry</span></a>
    <a class="nav-link-admin" th:classappend="${activeMenu == 'enrollments'} ? ' active'" href="/admin/enrollments"><span class="nav-dot"></span><span>Enrollments</span></a>
    <a class="nav-link-admin" th:classappend="${activeMenu == 'joincodes'} ? ' active'" href="/admin/join-codes"><span class="nav-dot"></span><span>Join Codes</span></a>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1 class="topbar-title" th:text="${pageTitle}">Page Title</h1>
        <div class="topbar-subtitle" th:text="${pageSubtitle}">Page subtitle</div>
      </div>
      <div>
        <a href="/admin" class="btn btn-outline-secondary btn-sm">Home</a>
      </div>
    </div>

    <div class="content" th:replace="${content}">
      <!-- content -->
    </div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
