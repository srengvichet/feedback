<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${pageTitle != null ? pageTitle : 'NUM Feedback Admin'}">NUM Feedback Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --sidebar-bg:#0f172a;
      --sidebar-text:#cbd5e1;
      --sidebar-active:#2563eb;
      --sidebar-hover:#1e293b;
      --page-bg:#f6f8fb;
      --card-bg:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --primary:#2563eb;
      --primary-dark:#1d4ed8;
      --success:#16a34a;
      --warning:#d97706;
      --danger:#dc2626;
      --radius:16px;
      --shadow:0 10px 30px rgba(15,23,42,.08);
    }

    html, body {
      height: 100%;
    }

    body{
      margin:0;
      background:var(--page-bg);
      color:var(--text);
      font-family:"Segoe UI", "Noto Sans Khmer", system-ui, -apple-system, sans-serif;
    }

    .admin-shell{
      display:flex;
      min-height:100vh;
    }

    .sidebar{
      width:270px;
      background:linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color:var(--sidebar-text);
      padding:22px 16px;
      position:sticky;
      top:0;
      height:100vh;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      padding:8px 10px 18px;
      border-bottom:1px solid rgba(255,255,255,.08);
      margin-bottom:16px;
    }

    .brand-logo{
      width:42px;
      height:42px;
      border-radius:12px;
      background:linear-gradient(135deg, #2563eb, #1d4ed8);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      box-shadow:0 8px 18px rgba(37,99,235,.35);
    }

    .brand-title{
      font-size:1rem;
      font-weight:700;
      color:#fff;
      margin:0;
      line-height:1.2;
    }

    .brand-subtitle{
      font-size:.8rem;
      color:#94a3b8;
      margin:2px 0 0;
    }

    .nav-section{
      margin-top:18px;
    }

    .nav-caption{
      font-size:.72rem;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#94a3b8;
      font-weight:700;
      padding:0 10px 8px;
    }

    .nav-link-admin{
      display:flex;
      align-items:center;
      gap:10px;
      padding:11px 12px;
      margin:4px 0;
      border-radius:12px;
      color:var(--sidebar-text);
      text-decoration:none;
      font-weight:600;
      transition:.18s ease;
    }

    .nav-link-admin:hover{
      background:var(--sidebar-hover);
      color:#fff;
    }

    .nav-link-admin.active{
      background:linear-gradient(135deg, var(--sidebar-active), var(--primary-dark));
      color:#fff;
      box-shadow:0 8px 16px rgba(37,99,235,.28);
    }

    .nav-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:currentColor;
      opacity:.9;
    }

    .main{
      flex:1;
      min-width:0;
    }

    .topbar{
      background:#fff;
      border-bottom:1px solid var(--border);
      padding:18px 28px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      position:sticky;
      top:0;
      z-index:20;
    }

    .topbar-title{
      font-size:1.2rem;
      font-weight:700;
      margin:0;
    }

    .topbar-subtitle{
      font-size:.88rem;
      color:var(--muted);
      margin:2px 0 0;
    }

    .topbar-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .content{
      padding:28px;
    }

    .page-card{
      background:var(--card-bg);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .stat-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:16px;
      margin-bottom:20px;
    }

    .stat-card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .stat-label{
      font-size:.85rem;
      color:var(--muted);
      font-weight:600;
      margin-bottom:6px;
    }

    .stat-value{
      font-size:1.65rem;
      font-weight:800;
      margin:0;
    }

    .stat-note{
      font-size:.8rem;
      color:var(--muted);
      margin-top:6px;
    }

    .table thead th{
      font-size:.8rem;
      text-transform:uppercase;
      letter-spacing:.05em;
      color:var(--muted);
      white-space:nowrap;
    }

    .table tbody tr:hover{
      background:#f8fafc;
    }

    .card{
      border-radius:16px;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
    }

    .btn-primary{
      background:linear-gradient(135deg, var(--primary), var(--primary-dark));
      border:none;
    }

    .btn-primary:hover{
      background:linear-gradient(135deg, var(--primary-dark), #1e40af);
    }

    .badge-soft{
      background:#eef2ff;
      color:#3730a3;
      border:1px solid #c7d2fe;
      border-radius:10px;
      padding:.45rem .65rem;
      font-weight:700;
    }

    @media (max-width: 992px){
      .sidebar{
        display:none;
      }
      .content{
        padding:18px;
      }
      .topbar{
        padding:14px 18px;
      }
      .stat-grid{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
    }

    @media (max-width: 576px){
      .stat-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
<div class="admin-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">N</div>
      <div>
        <p class="brand-title" th:text="#{common.brand}">NUM Feedback</p>
        <p class="brand-subtitle" th:text="#{admin.brand.subtitle}">Admin Panel</p>
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-caption" th:text="#{admin.nav.overview}">Overview</div>
      <a class="nav-link-admin" th:classappend="${activeMenu == 'dashboard'} ? ' active'" href="/admin">
        <span class="nav-dot"></span><span th:text="#{admin.nav.dashboard}">Dashboard</span>
      </a>
      <a class="nav-link-admin" th:classappend="${activeMenu == 'reports'} ? ' active'" href="/admin/reports">
        <span class="nav-dot"></span><span th:text="#{admin.nav.reports}">Reports</span>
      </a>
      <a class="nav-link-admin" th:classappend="${activeMenu == 'teachers'} ? ' active'" href="/admin/teachers">
        <span class="nav-dot"></span><span th:text="#{admin.nav.teachers}">Teachers</span>
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-caption" th:text="#{admin.nav.academic}">Academic Setup</div>
      <a class="nav-link-admin" th:classappend="${activeMenu == 'semesters'} ? ' active'" href="/admin/semesters">
        <span class="nav-dot"></span><span th:text="#{admin.nav.semesters}">Semesters</span>
      </a>
      <a class="nav-link-admin" th:classappend="${activeMenu == 'courses'} ? ' active'" href="/admin/courses">
        <span class="nav-dot"></span><span th:text="#{admin.nav.courses}">Courses</span>
      </a>
      <a class="nav-link-admin" th:classappend="${activeMenu == 'cohorts'} ? ' active'" href="/admin/cohorts">
        <span class="nav-dot"></span><span th:text="#{admin.nav.cohorts}">Cohorts</span>
      </a>
      <a class="nav-link-admin" th:classappend="${activeMenu == 'sections'} ? ' active'" href="/admin/sections">
        <span class="nav-dot"></span><span th:text="#{admin.nav.sections}">Sections</span>
      </a>
      <a class="nav-link-admin" th:classappend="${activeMenu == 'teaching'} ? ' active'" href="/admin/teaching">
        <span class="nav-dot"></span><span th:text="#{admin.nav.teaching}">Teaching Schedule</span>
      </a>
      <a class="nav-link-admin" th:classappend="${activeMenu == 'windows'} ? ' active'" href="/admin/windows">
        <span class="nav-dot"></span><span th:text="#{admin.nav.windows}">Evaluation Windows</span>
      </a>
      <a class="nav-link-admin" th:classappend="${activeMenu == 'questions'} ? ' active'" href="/admin/questions">
        <span class="nav-dot"></span><span th:text="#{admin.nav.questions}">Questions</span>
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-caption" th:text="#{admin.nav.students}">Students</div>
      <a class="nav-link-admin" th:classappend="${activeMenu == 'registry'} ? ' active'" href="/admin/students/registry">
        <span class="nav-dot"></span><span th:text="#{admin.nav.registry}">Student Registry</span>
      </a>
      <a class="nav-link-admin" th:classappend="${activeMenu == 'enrollments'} ? ' active'" href="/admin/enrollments">
        <span class="nav-dot"></span><span th:text="#{admin.nav.enrollments}">Enrollments</span>
      </a>
      <a class="nav-link-admin" th:classappend="${activeMenu == 'joincodes'} ? ' active'" href="/admin/join-codes">
        <span class="nav-dot"></span><span th:text="#{admin.nav.joincodes}">Join Codes</span>
      </a>
    </div>

    <!-- Sidebar logout -->
    <div style="margin-top:auto;padding-top:24px;border-top:1px solid rgba(255,255,255,.08);margin-left:-4px;margin-right:-4px;">
      <div style="padding:6px 10px 10px;font-size:.78rem;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.06em;" th:text="#{admin.nav.account}">Account</div>
      <form th:action="@{/logout}" method="post" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit"
                style="width:100%;display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:12px;background:transparent;border:none;color:#f87171;font-weight:600;font-size:.9rem;cursor:pointer;transition:.18s ease;text-align:left;"
                onmouseover="this.style.background='rgba(220,38,38,.12)'"
                onmouseout="this.style.background='transparent'">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z"/>
            <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/>
          </svg>
          <span th:text="#{common.signout}">Sign Out</span>
        </button>
      </form>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div>
        <h1 class="topbar-title" th:text="${pageTitle != null ? pageTitle : #{admin.dashboard.title}}">Admin Dashboard</h1>
        <div class="topbar-subtitle" th:text="${pageSubtitle != null ? pageSubtitle : #{admin.dashboard.subtitle}}">
          Manage your system data and workflows.
        </div>
      </div>

      <div class="topbar-actions" style="align-items:center;">
        <a href="/admin" class="btn btn-outline-secondary btn-sm" th:text="#{common.home}">Home</a>

        <!-- Language toggle -->
        <div style="display:flex;align-items:center;gap:2px;background:#f1f5f9;border:1px solid var(--border);border-radius:30px;padding:4px 6px;">
          <a href="javascript:void(0)" onclick="switchLang('en')"
             style="cursor:pointer;text-decoration:none;font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:20px;transition:.15s;"
             th:style="${#locale.language == 'en'} ? 'background:#fff;color:#2563eb;box-shadow:0 1px 4px rgba(0,0,0,.1);' : 'color:#6b7280;'">EN</a>
          <a href="javascript:void(0)" onclick="switchLang('kh')"
             style="cursor:pointer;text-decoration:none;font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:20px;transition:.15s;"
             th:style="${#locale.language == 'kh'} ? 'background:#fff;color:#2563eb;box-shadow:0 1px 4px rgba(0,0,0,.1);' : 'color:#6b7280;'">KH</a>
        </div>

        <!-- User chip + logout -->
        <div class="d-flex align-items-center gap-2 ms-1">
          <div style="display:flex;align-items:center;gap:8px;background:#f1f5f9;border:1px solid var(--border);border-radius:30px;padding:5px 14px 5px 6px;">
            <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;">A</div>
            <span style="font-size:.85rem;font-weight:600;color:var(--text);" sec:authentication="name">Admin</span>
          </div>

          <form th:action="@{/logout}" method="post" style="margin:0;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit"
                    class="btn btn-sm"
                    style="background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;border-radius:10px;font-weight:600;padding:5px 14px;white-space:nowrap;"
                    onmouseover="this.style.background='#fecaca'"
                    onmouseout="this.style.background='#fee2e2'">
              <span th:text="#{common.signout}">Sign Out</span>
            </button>
          </form>
        </div>
      </div>
    </div>

    <div class="content">
      <th:block th:fragment="content">
        <!-- child page content -->
      </th:block>
    </div>
  </main>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function switchLang(lang) {
  const u = new URL(window.location.href);
  u.searchParams.set('lang', lang);
  window.location.href = u.toString();
}
</script>
</body>
</html>
