<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Student Registry</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      background: #f1f5f9;
      color: #0f172a;
      font-family: "Noto Sans Khmer", "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    .page-shell {
      max-width: 1080px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }
    .hero {
      background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 60%, #38bdf8 100%);
      border-radius: 24px;
      padding: 1.5rem;
      color: #fff;
      box-shadow: 0 18px 40px rgba(15, 23, 42, .18);
    }
    .hero a {
      color: rgba(255,255,255,.82);
      text-decoration: none;
      font-weight: 700;
    }
    .hero a:hover {
      color: #fff;
    }
    .hero h1 {
      margin: .85rem 0 .25rem;
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -.02em;
    }
    .hero p {
      margin: 0;
      color: rgba(255,255,255,.8);
    }
    .card {
      border: 0;
      border-radius: 24px;
      box-shadow: 0 16px 36px rgba(15, 23, 42, .08);
    }
    .form-label {
      font-weight: 700;
      color: #334155;
    }
    .form-control,
    .form-select {
      min-height: 46px;
      border-radius: 14px;
      border-color: #dbe3ee;
    }
    .form-control:focus,
    .form-select:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 .2rem rgba(37, 99, 235, .12);
    }
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .45rem .85rem;
      border-radius: 999px;
      background: #e2e8f0;
      color: #334155;
      font-weight: 700;
      font-size: .85rem;
    }
  </style>
</head>
<body>
<div class="page-shell">
  <div class="hero mb-4">
    <a th:href="@{/admin/students/registry}"><i class="bi bi-arrow-left"></i> Back to Student Registry</a>
    <h1>Edit Student Record</h1>
    <p>Update student identity, cohort placement, and linked account details from one place.</p>
    <div class="d-flex flex-wrap gap-2 mt-3">
      <span class="meta-chip">
        <i class="bi bi-person-badge"></i>
        <span th:text="${record.id}">0</span>
      </span>
      <span class="meta-chip" th:if="${record.claimed}">
        <i class="bi bi-person-check"></i>
        Claimed account linked
      </span>
      <span class="meta-chip" th:if="${!record.claimed}">
        <i class="bi bi-hourglass-split"></i>
        Pending claim
      </span>
      <span class="meta-chip" th:if="${record.user != null}">
        <i class="bi bi-link-45deg"></i>
        <span th:text="${record.user.username}">linked-user</span>
      </span>
    </div>
  </div>

  <div class="alert alert-danger" th:if="${error != null}">
    <i class="bi bi-exclamation-octagon me-2"></i>
    <span th:text="${error}">There is a problem with the submitted form.</span>
  </div>

  <div class="card">
    <div class="card-body p-4 p-lg-5">
      <form method="post"
            th:action="@{/admin/students/registry/{id}/edit(id=${record.id})}"
            class="row g-3">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="col-md-4">
          <label class="form-label">Student Login</label>
          <input class="form-control" name="studentLogin" th:value="${form.studentLogin}" required>
        </div>

        <div class="col-md-4">
          <label class="form-label">Full Name</label>
          <input class="form-control" name="fullName" th:value="${form.fullName}">
        </div>

        <div class="col-md-4">
          <label class="form-label">Gender</label>
          <select class="form-select" name="gender">
            <option value="" th:selected="${form.gender == null or form.gender == ''}">Not set</option>
            <option value="MALE" th:selected="${form.gender == 'MALE' or form.gender == 'Male'}">Male</option>
            <option value="FEMALE" th:selected="${form.gender == 'FEMALE' or form.gender == 'Female'}">Female</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">First Name</label>
          <input class="form-control" name="firstName" th:value="${form.firstName}">
        </div>

        <div class="col-md-3">
          <label class="form-label">Last Name</label>
          <input class="form-control" name="lastName" th:value="${form.lastName}">
        </div>

        <div class="col-md-3">
          <label class="form-label">First Name (Khmer)</label>
          <input class="form-control" name="firstNameKh" th:value="${form.firstNameKh}">
        </div>

        <div class="col-md-3">
          <label class="form-label">Last Name (Khmer)</label>
          <input class="form-control" name="lastNameKh" th:value="${form.lastNameKh}">
        </div>

        <div class="col-md-4">
          <label class="form-label">Date of Birth</label>
          <input class="form-control" type="date" name="dateOfBirth" th:value="${form.dateOfBirth}">
        </div>

        <div class="col-md-4">
          <label class="form-label">Phone</label>
          <input class="form-control" name="phone" th:value="${form.phone}">
        </div>

        <div class="col-md-4">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" name="email" th:value="${form.email}">
        </div>

        <div class="col-md-4">
          <label class="form-label">Cohort</label>
          <select class="form-select" name="cohortId">
            <option value="" th:selected="${form.cohortId == null}">No cohort</option>
            <option th:each="c : ${cohorts}"
                    th:value="${c.id}"
                    th:selected="${form.cohortId != null and form.cohortId == c.id}"
                    th:text="${c.cohortNo + (c.faculty != null and !c.faculty.isBlank() ? ' • ' + c.faculty : '')}">
              34
            </option>
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label">Group No.</label>
          <input class="form-control" type="number" min="1" name="groupNo" th:value="${form.groupNo}">
        </div>

        <div class="col-md-4">
          <label class="form-label">Class Name</label>
          <input class="form-control" name="className" th:value="${form.className}">
        </div>

        <div class="col-md-4">
          <label class="form-label">Shift Time</label>
          <select class="form-select" name="shiftTime">
            <option value="" th:selected="${form.shiftTime == null or form.shiftTime == ''}">Not set</option>
            <option th:each="shift : ${shifts}"
                    th:value="${shift.name()}"
                    th:selected="${form.shiftTime != null and form.shiftTime == shift.name()}"
                    th:text="${shift.label}">
              Morning
            </option>
          </select>
        </div>

        <div class="col-12">
          <label class="form-label">Remark</label>
          <textarea class="form-control" rows="4" name="remark" th:text="${form.remark}"></textarea>
        </div>

        <div class="col-12 d-flex flex-wrap gap-2 pt-2">
          <button class="btn btn-primary px-4" type="submit">
            <i class="bi bi-save me-1"></i> Save Changes
          </button>
          <a class="btn btn-outline-secondary px-4" th:href="@{/admin/students/registry}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
