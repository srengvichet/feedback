<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Teaching Schedule (Bulk)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --shadow: 0 10px 30px rgba(15,23,42,.08);
      --line: #e5e7eb;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
    }
    body { background: #f1f5f9; }
    .page-wrap { max-width: 1480px; margin: 0 auto; }

    .topbar {
      background: linear-gradient(135deg,#fff 0%,#f7faff 100%);
      border-radius: 24px;
      padding: 28px 36px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .topbar::after {
      content: '';
      position: absolute;
      right: -60px;
      top: -60px;
      width: 220px;
      height: 220px;
      background: rgba(37,99,235,.07);
      border-radius: 50%;
      pointer-events: none;
    }
    .topbar .back-link {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      color: var(--primary);
      font-weight: 700;
      font-size: .9rem;
      text-decoration: none;
      margin-bottom: 10px;
    }
    .topbar .back-link:hover { color: var(--primary-dark); }
    .page-title { font-size: 1.95rem; font-weight: 800; color: #0f172a; margin: 0; }
    .page-subtitle { color: var(--muted); margin: 4px 0 0; font-size: .97rem; }

    .card {
      border: none !important;
      border-radius: 22px !important;
      box-shadow: var(--shadow) !important;
      overflow: hidden;
      background: #fff;
    }
    .panel-head {
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg,#fff 0%,#fbfdff 100%);
    }
    .panel-title { font-size: 1.05rem; font-weight: 800; color: #0f172a; margin: 0; }
    .panel-subtitle { color: var(--muted); font-size: .88rem; margin: 2px 0 0; }
    .panel-body { padding: 20px 24px; }

    .form-label { font-weight: 700; color: #374151; font-size: .9rem; }
    .form-control, .form-select {
      border-radius: 14px;
      min-height: 46px;
      border: 1px solid #dbe3ee;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .btn { border-radius: 14px; font-weight: 700; }
    .btn-primary {
      background: linear-gradient(135deg,#2563eb,#1d4ed8);
      border: none;
      box-shadow: 0 4px 14px rgba(37,99,235,.3);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg,#1d4ed8,#1e40af);
      box-shadow: 0 6px 18px rgba(37,99,235,.4);
    }
    .soft-pill {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      background: #eef4ff;
      color: #1d4ed8;
      border-radius: 999px;
      padding: .45rem .75rem;
      font-size: .82rem;
      font-weight: 700;
      border: 1px solid rgba(37,99,235,.08);
    }

    .bulk-table thead th {
      background: #f8fafc;
      font-weight: 700;
      font-size: .88rem;
      color: #374151;
      border-bottom: 2px solid var(--line);
      padding: 12px 16px;
    }
    .bulk-table tbody td {
      padding: 10px 16px;
      vertical-align: middle;
      border-bottom: 1px solid #f1f5f9;
    }
    .bulk-table tbody tr:last-child td { border-bottom: none; }
    .row-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: #eef4ff;
      color: var(--primary);
      border-radius: 50%;
      font-weight: 800;
      font-size: .9rem;
    }
    .section-divider {
      border: none;
      border-top: 1px solid var(--line);
      margin: 22px 0;
    }
  </style>
</head>
<body>
<div class="container-fluid py-4 px-3 px-md-4">
  <div class="page-wrap">

    <!-- Topbar -->
    <div class="topbar">
      <a href="/admin/teaching" class="back-link">
        <i class="bi bi-arrow-left"></i> Teaching Schedule
      </a>
      <h1 class="page-title">Bulk Create Teaching Schedules</h1>
      <p class="page-subtitle">Create up to 5 teaching schedule rows at once.</p>
    </div>

    <!-- Alert -->
    <div th:if="${msg == 'invalid'}" class="alert alert-warning d-flex align-items-center gap-2 mb-4" style="border-radius:14px;">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span>Please fill all 5 rows (course + teacher).</span>
    </div>

    <!-- Main card -->
    <div class="card">
      <div class="panel-head">
        <div class="panel-title">Schedule Details</div>
        <div class="panel-subtitle">Fill in the shared fields and then specify course &amp; teacher for each of the 5 rows.</div>
      </div>
      <div class="panel-body">
        <form method="post" th:action="@{/admin/teaching/bulk}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <!-- Header fields -->
          <div class="row g-3 mb-2">
            <div class="col-12 col-md-4 col-lg-3">
              <label class="form-label">Semester</label>
              <select class="form-select" name="semesterId" required>
                <option value="">-- Select --</option>
                <option th:each="s : ${semesters}" th:value="${s.id}" th:text="${s.name}"></option>
              </select>
            </div>

            <div class="col-12 col-md-4 col-lg-3">
              <label class="form-label">Shift</label>
              <select class="form-select" name="shiftTime" required>
                <option value="">-- Select --</option>
                <option th:each="sh : ${shifts}" th:value="${sh}" th:text="${sh.label}"></option>
              </select>
            </div>

            <div class="col-6 col-md-2">
              <label class="form-label">Building</label>
              <input class="form-control" name="building" placeholder="A">
            </div>

            <div class="col-6 col-md-2">
              <label class="form-label">Room</label>
              <input class="form-control" name="room" placeholder="201">
            </div>

            <div class="col-12 col-md-4 col-lg-2">
              <label class="form-label">Class Name</label>
              <input class="form-control" name="className" placeholder="BIT3A / G1">
            </div>
          </div>

          <hr class="section-divider">

          <!-- 5-row bulk table -->
          <div class="table-responsive">
            <table class="table bulk-table mb-0">
              <thead>
                <tr>
                  <th style="width:60px;">#</th>
                  <th>Course</th>
                  <th>Teacher</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="n : ${#numbers.sequence(1,5)}">
                  <td><span class="row-badge" th:text="${n}">1</span></td>
                  <td>
                    <select class="form-select" name="courseIds" required>
                      <option value="">-- Select course --</option>
                      <option th:each="c : ${courses}"
                              th:value="${c.id}"
                              th:text="${c.code + ' - ' + c.name}"></option>
                    </select>
                  </td>
                  <td>
                    <select class="form-select" name="teacherIds" required>
                      <option value="">-- Select teacher --</option>
                      <option th:each="t : ${teachers}"
                              th:value="${t.id}"
                              th:text="${t.username}"></option>
                    </select>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="mt-4">
            <button class="btn btn-primary px-5" style="min-height:46px;">
              <i class="bi bi-plus-circle me-2"></i>Create 5 Schedule Rows
            </button>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>
</body>
</html>
