<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Edit Teaching</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --shadow: 0 10px 30px rgba(15,23,42,.08);
      --line: #e5e7eb;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
    }
    body { background: #f1f5f9; }
    .page-wrap { max-width: 1480px; margin: 0 auto; }

    .topbar {
      background: linear-gradient(135deg,#fff 0%,#f7faff 100%);
      border-radius: 24px;
      padding: 28px 36px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .topbar::after {
      content: '';
      position: absolute;
      right: -60px;
      top: -60px;
      width: 220px;
      height: 220px;
      background: rgba(37,99,235,.07);
      border-radius: 50%;
      pointer-events: none;
    }
    .topbar .back-link {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      color: var(--primary);
      font-weight: 700;
      font-size: .9rem;
      text-decoration: none;
      margin-bottom: 10px;
    }
    .topbar .back-link:hover { color: var(--primary-dark); }
    .page-title { font-size: 1.95rem; font-weight: 800; color: #0f172a; margin: 0; }
    .page-subtitle { color: var(--muted); margin: 4px 0 0; font-size: .97rem; }

    .card {
      border: none !important;
      border-radius: 22px !important;
      box-shadow: var(--shadow) !important;
      overflow: hidden;
      background: #fff;
    }
    .panel-head {
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg,#fff 0%,#fbfdff 100%);
    }
    .panel-title { font-size: 1.05rem; font-weight: 800; color: #0f172a; margin: 0; }
    .panel-subtitle { color: var(--muted); font-size: .88rem; margin: 2px 0 0; }
    .panel-body { padding: 20px 24px; }

    .form-label { font-weight: 700; color: #374151; font-size: .9rem; }
    .form-control, .form-select {
      border-radius: 14px;
      min-height: 46px;
      border: 1px solid #dbe3ee;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .btn { border-radius: 14px; font-weight: 700; }
    .btn-primary {
      background: linear-gradient(135deg,#2563eb,#1d4ed8);
      border: none;
      box-shadow: 0 4px 14px rgba(37,99,235,.3);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg,#1d4ed8,#1e40af);
      box-shadow: 0 6px 18px rgba(37,99,235,.4);
    }
  </style>
</head>
<body>
<div class="container-fluid py-4 px-3 px-md-4">
  <div class="page-wrap">

    <!-- Topbar -->
    <div class="topbar">
      <a href="/admin/teaching" class="back-link">
        <i class="bi bi-arrow-left"></i> Teaching Schedule
      </a>
      <h1 class="page-title">Edit Teaching Record</h1>
      <p class="page-subtitle">Update the details of this teaching schedule entry.</p>
    </div>

    <!-- Centered card -->
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8 mx-auto">
        <div class="card">
          <div class="panel-head">
            <div class="panel-title">Edit Schedule Details</div>
            <div class="panel-subtitle">Modify the fields below and save your changes.</div>
          </div>
          <div class="panel-body">
            <form method="post" th:action="@{|/admin/teaching/${t.id}/edit|}" class="row g-3">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

              <div class="col-md-6">
                <label class="form-label">Semester</label>
                <select class="form-select" name="semesterId" required>
                  <option th:each="s : ${semesters}" th:value="${s.id}" th:text="${s.name}"
                          th:selected="${t.semester != null and t.semester.id == s.id}"></option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Weekday</label>
                <select class="form-select" name="weekday" required>
                  <option th:each="d : ${weekdays}" th:value="${d}" th:text="${d}"
                          th:selected="${t.weekday == d}"></option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Shift</label>
                <select class="form-select" name="shiftTime" required>
                  <option th:each="sh : ${shifts}" th:value="${sh}" th:text="${sh.label}"
                          th:selected="${t.shiftTime == sh}"></option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Cohort</label>
                <select class="form-select" name="cohortId">
                  <option value="">-- None --</option>
                  <option th:each="co : ${cohorts}" th:value="${co.id}" th:text="${co.cohortNo}"
                          th:selected="${t.cohort != null and t.cohort.id == co.id}"></option>
                </select>
              </div>

              <div class="col-md-4">
                <label class="form-label">Group No</label>
                <input class="form-control" type="number" name="groupNo" th:value="${t.groupNo}">
              </div>

              <div class="col-md-4">
                <label class="form-label">Subject #</label>
                <input class="form-control" type="number" name="subjectNo" th:value="${t.subjectNo}">
              </div>

              <div class="col-md-4">
                <label class="form-label">Class Name</label>
                <input class="form-control" name="className" th:value="${t.className}">
              </div>

              <div class="col-12">
                <label class="form-label">Course</label>
                <select class="form-select" name="courseId" required>
                  <option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.code + ' - ' + c.name}"
                          th:selected="${t.course != null and t.course.id == c.id}"></option>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label">Teacher</label>
                <select class="form-select" name="teacherId" required>
                  <option th:each="u : ${teachers}" th:value="${u.id}" th:text="${u.username}"
                          th:selected="${t.teacher != null and t.teacher.id == u.id}"></option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Building</label>
                <input class="form-control" name="building" th:value="${t.building}">
              </div>

              <div class="col-md-6">
                <label class="form-label">Room</label>
                <input class="form-control" name="room" th:value="${t.room}">
              </div>

              <div class="col-12 pt-2">
                <button class="btn btn-primary px-5" style="min-height:46px;">
                  <i class="bi bi-check2-circle me-2"></i>Save Changes
                </button>
              </div>

            </form>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
