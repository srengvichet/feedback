<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <div class="container py-4" style="max-width:520px;">
    <h4 class="mb-1">Student Registration</h4>
    <p class="text-muted">Use your Student Login. Cohort/Group/Class/Shift are locked from admin registry.</p>

    <div th:if="${msg != null}" class="alert alert-warning" th:text="${msg}"></div>
    <div th:if="${error != null}" class="alert alert-warning" th:text="${error}"></div>
    <div class="card shadow-sm">
      <div class="card-body">
        <form method="post" th:action="@{/register}" th:object="${form}" class="row g-2">
          <div class="col-12">
            <label class="form-label">Student Login</label>
            <input class="form-control" th:field="*{studentLogin}" placeholder="e.g., srengvichet" required>
            <div class="text-danger small" th:if="${#fields.hasErrors('studentLogin')}" th:errors="*{studentLogin}">
            </div>
          </div>

          <div class="col-12">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" th:field="*{password}" minlength="6" required>
          </div>

          <div class="col-12">
            <label class="form-label">Confirm Password</label>
            <input class="form-control" type="password" th:field="*{confirmPassword}" minlength="6" required>
          </div>

          <div class="col-12 mt-2">
            <button class="btn btn-primary w-100">Create Account</button>
          </div>
        </form>

        <div class="mt-3 small">
          Already have an account? <a href="/login">Login</a>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
