<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h4 class="mb-0">Welcome to , <span th:text="${username}"></span></h4>
        <div class="text-muted">Role: <span th:text="${role}"></span></div>
      </div>
      <form th:action="@{/login?logout}" method="post" class="d-inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn btn-outline-secondary" type="submit">Logout</button>
      </form>

    </div>

    <div class="row g-3">
      <div class="col-12 col-md-4" th:if="${role == 'STUDENT'}">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5>Student</h5>
            <p class="text-muted mb-2">Submit end-semester feedback (mobile-friendly).</p>
            <a class="btn btn-primary" href="/student">Go</a>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-4" th:if="${role == 'TEACHER'}">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5>Teacher</h5>
            <p class="text-muted mb-2">Self-assessment (Week 8) + reports.</p>
            <a class="btn btn-primary" href="/teacher">Go</a>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-4" th:if="${role == 'ADMIN' or role == 'QA'}">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5>Admin / QA</h5>
            <p class="text-muted mb-2">Manage semesters, windows, questions, enrollments.</p>
            <a class="btn btn-primary" href="/admin">Go</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
