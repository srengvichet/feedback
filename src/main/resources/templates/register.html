<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Registration</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    body{
      min-height:100vh;
      background: radial-gradient(circle at top left,#f8fbff 0%,#f4f7fb 40%,#eef3f9 100%);
      font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px 0;
    }

    .register-shell{
      width:100%;
      max-width:760px;
    }

    .topbar{
      background:linear-gradient(135deg,#ffffff 0%,#f7faff 100%);
      border:1px solid rgba(255,255,255,.9);
      border-radius:24px;
      box-shadow:0 12px 30px rgba(15,23,42,.08);
      padding:24px 28px;
      position:relative;
      overflow:hidden;
      margin-bottom:1rem;
    }

    .topbar::after{
      content:"";
      position:absolute;
      right:-60px;
      top:-60px;
      width:220px;
      height:220px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(37,99,235,.18), rgba(37,99,235,.02) 70%);
    }

    .topbar > *{position:relative;z-index:1;}

    .page-title{
      font-size:1.8rem;
      font-weight:800;
      margin:0;
      letter-spacing:-.02em;
    }

    .page-sub{
      color:#6b7280;
      margin-top:.3rem;
      font-size:.93rem;
    }

    .card{
      border:none !important;
      border-radius:22px !important;
      box-shadow:0 12px 30px rgba(15,23,42,.08) !important;
      overflow:hidden;
      background:#fff;
    }

    .form-control{
      border-radius:14px;
      min-height:46px;
      border:1px solid #dbe3ee;
    }

    .form-control:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 .2rem rgba(37,99,235,.10);
    }

    .form-label{
      font-weight:700;
      color:#374151;
      font-size:.92rem;
    }

    .btn{
      border-radius:14px;
      font-weight:700;
    }

    .btn-primary{
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      border:none;
      box-shadow:0 8px 18px rgba(37,99,235,.22);
    }

    .info-card{
      border-radius:18px;
      border:1px solid rgba(0,0,0,.06);
      background:linear-gradient(180deg,#f8fbff 0%,#f4f9ff 100%);
      padding:14px 16px;
    }

    .info-title{
      font-weight:800;
      margin-bottom:.4rem;
      color:#1d4ed8;
    }

    .small-muted{
      color:#6b7280;
      font-size:.84rem;
    }
  </style>
</head>

<body>
  <div class="register-shell">

    <div class="topbar">
      <div class="d-flex flex-wrap justify-content-between align-items-start gap-2">
        <div>
          <h1 class="page-title">Student Registration</h1>
          <div class="page-sub">Activate your NUM Feedback account using the Student Login imported by admin.</div>
        </div>
        <a class="btn btn-outline-secondary btn-sm" href="/login">
          <i class="bi bi-arrow-left"></i> Back to Login
        </a>
      </div>
    </div>

    <div th:if="${error != null}" class="alert alert-danger mt-3" th:text="${error}"></div>

    <div class="card mt-3">
      <div class="card-body p-4">
        <form method="post" th:action="@{/register}" th:object="${form}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <div class="mb-3">
            <label class="form-label">Student Login ID</label>
            <input class="form-control" th:field="*{studentLogin}" placeholder="e.g. NUM12345" required>
            <div class="form-text">Must match the Student Login ID imported by admin.</div>
          </div>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Password</label>
              <input class="form-control" type="password" th:field="*{password}" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Confirm Password</label>
              <input class="form-control" type="password" th:field="*{confirmPassword}" required>
            </div>
          </div>

          <div class="mt-4">
            <button class="btn btn-primary w-100">
              <i class="bi bi-person-check me-1"></i>
              Create Account
            </button>
          </div>
        </form>

        <div th:if="${registry != null}" class="info-card mt-4">
          <div class="info-title">Registry Info (Locked)</div>

          <div th:text="'Name: ' + (registry.fullName != null ? registry.fullName : '-')"></div>
          <div th:text="'Cohort: ' + (registry.cohort != null ? registry.cohort.cohortNo : '-')"></div>
          <div th:text="'Group: ' + (registry.groupNo != null ? registry.groupNo : '-')"></div>
          <div th:text="'Class: ' + (registry.className != null ? registry.className : '-')"></div>
          <div th:text="'Shift: ' + (registry.shiftTime != null ? registry.shiftTime : '-')"></div>

          <div class="small-muted mt-2">
            These details come from the Student Registry and cannot be edited here.
          </div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
