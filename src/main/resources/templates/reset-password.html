<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password — NUM Feedback</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, #f0f6ff 0%, #f4f7fb 40%, #eaf0f9 100%);
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .card { width: 100%; max-width: 440px; border: none; border-radius: 24px; box-shadow: 0 20px 50px rgba(15,23,42,.12); overflow: hidden; }
    .card-head { background: linear-gradient(135deg, #1d4ed8, #2563eb); padding: 28px 32px; text-align: center; color: #fff; }
    .card-head h1 { font-size: 1.2rem; font-weight: 800; margin: 0; }
    .card-head p { margin: 6px 0 0; color: rgba(255,255,255,.75); font-size: .85rem; }
    .card-body { padding: 28px 32px; background: #fff; }
    .form-control { border-radius: 12px; min-height: 46px; border: 1.5px solid #dbe3ee; }
    .form-control:focus { border-color: #93c5fd; box-shadow: 0 0 0 .2rem rgba(37,99,235,.12); }
    .btn-primary { background: linear-gradient(135deg,#2563eb,#1d4ed8); border: none; border-radius: 12px; font-weight: 700; min-height: 46px; }
    .strength-bar { height: 5px; border-radius: 3px; transition: width .3s, background .3s; }
    .pw-wrap { position: relative; }
    .pw-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #6b7280; background: none; border: none; padding: 0; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-head">
    <div style="font-size:2rem;margin-bottom:8px;">🔐</div>
    <h1>Set New Password</h1>
    <p>Choose a strong password for your account</p>
  </div>
  <div class="card-body">

    <!-- Invalid token -->
    <div th:if="${invalid}">
      <div class="alert alert-danger border-0 rounded-3 mb-3">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        This password reset link has expired or already been used.
      </div>
      <a href="/forgot-password" class="btn btn-primary w-100">
        <i class="bi bi-arrow-clockwise me-1"></i>Request a New Link
      </a>
    </div>

    <!-- Valid token -->
    <div th:if="${!invalid}">

      <div th:if="${resetError}" class="alert alert-danger border-0 rounded-3 mb-3">
        <i class="bi bi-x-circle-fill me-2"></i>
        <span th:text="${resetError}">Error</span>
      </div>

      <form th:action="@{/reset-password}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" name="token" th:value="${token}" />

        <div class="mb-3">
          <label class="form-label fw-bold" style="font-size:.88rem;">New Password</label>
          <div class="pw-wrap">
            <input class="form-control" id="newPassword" name="newPassword" type="password"
                   placeholder="Minimum 8 characters" required minlength="8"
                   oninput="checkStrength(this.value)">
            <button type="button" class="pw-toggle" onclick="togglePw('newPassword', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="mt-2">
            <div class="bg-light rounded" style="height:5px;">
              <div id="strengthBar" class="strength-bar" style="width:0;background:#dc2626;"></div>
            </div>
            <div id="strengthLabel" class="text-muted mt-1" style="font-size:.78rem;"></div>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold" style="font-size:.88rem;">Confirm Password</label>
          <div class="pw-wrap">
            <input class="form-control" id="confirmPassword" name="confirmPassword" type="password"
                   placeholder="Re-enter your password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('confirmPassword', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <button class="btn btn-primary w-100" type="submit">
          <i class="bi bi-check-circle me-1"></i>Reset Password
        </button>
      </form>
    </div>

  </div>
</div>

<script>
  function togglePw(id, btn) {
    const input = document.getElementById(id);
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.querySelector('i').className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
  }

  function checkStrength(pw) {
    const bar = document.getElementById('strengthBar');
    const lbl = document.getElementById('strengthLabel');
    if (!bar) return;
    let score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const levels = [
      { w: '20%', bg: '#dc2626', label: 'Very weak' },
      { w: '40%', bg: '#f97316', label: 'Weak' },
      { w: '60%', bg: '#eab308', label: 'Fair' },
      { w: '80%', bg: '#22c55e', label: 'Strong' },
      { w: '100%', bg: '#16a34a', label: 'Very strong' },
    ];
    const lvl = levels[Math.max(0, score - 1)] || levels[0];
    bar.style.width = pw.length ? lvl.w : '0';
    bar.style.background = lvl.bg;
    lbl.textContent = pw.length ? lvl.label : '';
  }
</script>
</body>
</html>
