<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>My Schedule</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <a href="/student" class="btn btn-link px-0">&larr; Back</a>
  <h4 class="mb-1">My Subjects / Teachers</h4>

  <div th:if="${error != null}" class="alert alert-warning" th:text="${error}"></div>

  <div th:if="${semester != null}" class="text-muted mb-3">
    Semester: <span th:text="${semester.name}"></span>
    <span class="mx-2">|</span>
    Today: <span th:text="${todayWeekday}"></span>
    <span class="mx-2">|</span>
    Window:
    <span th:classappend="${windowOpen} ? 'text-success fw-semibold' : 'text-danger fw-semibold'"
          th:text="${windowOpen} ? 'OPEN' : 'CLOSED'"></span>
  </div>

  <div th:if="${student != null}" class="card shadow-sm mb-3">
    <div class="card-body">
      <div>
        Cohort: <b th:text="${student.cohort != null ? student.cohort.cohortNo : '-'}"></b>
        <span class="mx-2">|</span>
        Group: <b th:text="${student.groupNo != null ? student.groupNo : '-'}"></b>
        <span class="mx-2">|</span>
        Shift: <b th:text="${student.shiftTime != null ? student.shiftTime : '-'}"></b>
      </div>

      <form class="row g-2 mt-2" method="get" th:action="@{/student/schedule}">
        <div class="col-md-4">
          <label class="form-label">Filter by weekday</label>
          <select class="form-select" name="day">
            <option th:value="" th:selected="${selectedDay == null}">All days</option>
            <option th:each="d : ${weekdays}"
                    th:value="${d}"
                    th:text="${d}"
                    th:selected="${selectedDay != null and selectedDay == d}">
            </option>
          </select>
        </div>
        <div class="col-md-2 d-flex align-items-end">
          <button class="btn btn-primary w-100">Filter</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <h6 class="mb-3">Schedule</h6>

      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
          <tr>
            <th>No</th>
            <th>Weekday</th>
            <th>Course</th>
            <th>Teacher</th>
            <th>Building</th>
            <th>Room</th>
            <th>Action</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="t : ${schedules}"
              th:classappend="${t.weekday == todayWeekday} ? 'table-warning' : ''">
            <td th:text="${t.subjectNo != null ? t.subjectNo : '-'}"></td>
            <td th:text="${t.weekday}"></td>
            <td th:text="${t.course.code + ' - ' + t.course.name}"></td>
            <td th:text="${t.teacher.username}"></td>
            <td th:text="${t.building != null ? t.building : '-'}"></td>
            <td th:text="${t.room != null ? t.room : '-'}"></td>
            <td>
              <button class="btn btn-sm btn-success" th:disabled="${!windowOpen}">
                Evaluate
              </button>
            </td>
          </tr>

          <tr th:if="${#lists.isEmpty(schedules)}">
            <td colspan="7" class="text-muted">No schedule found for your cohort/group/shift.</td>
          </tr>
          </tbody>
        </table>
      </div>

      <div class="text-muted small">
        Rows highlighted in yellow are for today.
      </div>
    </div>
  </div>
</div>
</body>
</html>
